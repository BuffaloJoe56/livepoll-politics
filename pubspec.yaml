name: livepoll_politics
description: "Live political polling — vote once per day per country with phone auth. Dark modern design, works on mobile and web."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_app_check: ^0.3.2+4

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # UI & UX
  intl_phone_field: ^3.2.0
  fl_chart: ^0.70.2
  flutter_animate: ^4.5.2

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  riverpod_generator: ^2.6.4
  build_runner: ^2.4.15

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Add assets later if needed (flags, logos)
  # assets:
  #   - assets/images/
